name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate Android platform files
        run: flutter create --org com.bharatgps --project-name techapp --platforms=android .


      - name: Restore google-services.json
        run: |
          git checkout -- android/app/google-services.json || true
          ls -la android/app/google-services.json

      - name: Add google-services gradle plugin
        run: |
          python3 - <<'PYG'
          import os, re

          def patch_settings():
              for cand in ['android/settings.gradle.kts', 'android/settings.gradle']:
                  if not os.path.exists(cand):
                      continue
                  t = open(cand, encoding='utf-8').read()
                  if 'com.google.gms.google-services' in t:
                      return
                  kts = cand.endswith('.kts')
                  if kts:
                      line = '    id("com.google.gms.google-services") version "4.4.2" apply false'
                  else:
                      line = '    id "com.google.gms.google-services" version "4.4.2" apply false'
                  m = re.search(r'plugins\s*\{', t)
                  if m:
                      t = t[:m.end()] + '\n' + line + t[m.end():]
                      open(cand, 'w', encoding='utf-8').write(t)
                      print("Patched", cand)
                  return

          def patch_app():
              for cand in ['android/app/build.gradle.kts', 'android/app/build.gradle']:
                  if not os.path.exists(cand):
                      continue
                  t = open(cand, encoding='utf-8').read()
                  if 'com.google.gms.google-services' in t:
                      return
                  kts = cand.endswith('.kts')
                  m = re.search(r'plugins\s*\{', t)
                  if m:
                      if kts:
                          line = '    id("com.google.gms.google-services")'
                      else:
                          line = '    id "com.google.gms.google-services"'
                      t = t[:m.end()] + '\n' + line + t[m.end():]
                  else:
                      if kts:
                          t = t.rstrip() + '\napply(plugin = "com.google.gms.google-services")\n'
                      else:
                          t = t.rstrip() + '\napply plugin: "com.google.gms.google-services"\n'
                  open(cand, 'w', encoding='utf-8').write(t)
                  print("Patched", cand)
                  return

          patch_settings()
          patch_app()
          PYG

      - name: Enable core library desugaring
        run: |
          python3 - <<'PYD'
          import os, re

          def app_file():
              for cand in ['android/app/build.gradle.kts', 'android/app/build.gradle']:
                  if os.path.exists(cand):
                      return cand, cand.endswith('.kts')
              return None, False

          path, kts = app_file()
          if not path:
              print("no app build.gradle found"); raise SystemExit(0)
          t = open(path, encoding='utf-8').read()

          if 'coreLibraryDesugaring' in t:
              print("desugaring already present"); raise SystemExit(0)

          enable_line = ('        isCoreLibraryDesugaringEnabled = true\n'
                         if kts else
                         '        coreLibraryDesugaringEnabled true\n')

          # If a compileOptions block already exists, add the enable line inside it.
          m = re.search(r'compileOptions\s*\{', t)
          if m:
              t = t[:m.end()] + '\n' + enable_line + t[m.end():]
          else:
              am = re.search(r'android\s*\{', t)
              if kts:
                  block = ('\n    compileOptions {\n'
                           + enable_line +
                           '        sourceCompatibility = JavaVersion.VERSION_1_8\n'
                           '        targetCompatibility = JavaVersion.VERSION_1_8\n'
                           '    }\n')
              else:
                  block = ('\n    compileOptions {\n'
                           + enable_line +
                           '        sourceCompatibility JavaVersion.VERSION_1_8\n'
                           '        targetCompatibility JavaVersion.VERSION_1_8\n'
                           '    }\n')
              t = t[:am.end()] + block + t[am.end():]

          # Add the desugaring dependency.
          dep = ('\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")'
                 if kts else
                 '\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"')
          dm = re.search(r'dependencies\s*\{', t)
          if dm:
              t = t[:dm.end()] + dep + t[dm.end():]
          else:
              t = t.rstrip() + '\ndependencies {' + dep + '\n}\n'

          open(path, 'w', encoding='utf-8').write(t)
          print("Enabled desugaring in", path)
          PYD

      - name: Inject permissions into AndroidManifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          python3 - "$MANIFEST" <<'PY'
          import sys, re
          p = sys.argv[1]
          s = open(p, encoding='utf-8').read()

          perms = '''    <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.CAMERA"/>
              <uses-feature android:name="android.hardware.camera" android:required="false"/>
              <uses-feature android:name="android.hardware.location.gps" android:required="false"/>
              <queries>
                  <intent><action android:name="android.intent.action.VIEW"/><data android:scheme="https"/></intent>
                  <intent><action android:name="android.intent.action.DIAL"/><data android:scheme="tel"/></intent>
                  <intent><action android:name="android.intent.action.SENDTO"/><data android:scheme="mailto"/></intent>
                  <package android:name="com.whatsapp"/>
                  <package android:name="com.google.android.apps.maps"/>
              </queries>
          '''
          # insert permissions right after the opening <manifest ...> tag
          s = re.sub(r'(<manifest[^>]*>)', r'\1\n' + perms, s, count=1)
          # add cleartext + label on <application>
          s = s.replace('<application', '<application android:usesCleartextTraffic="true"', 1)
          s = re.sub(r'android:label="[^"]*"', 'android:label="BharatGPS Technician"', s, count=1)
          open(p, 'w', encoding='utf-8').write(s)
          print("Manifest patched.")
          PY
          echo "----- resulting manifest -----"
          cat android/app/src/main/AndroidManifest.xml

      - name: Set SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Get packages
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-release.apk out/BharatGPS-Technician.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BharatGPS-Technician-APK
          path: out/BharatGPS-Technician.apk
          if-no-files-found: error
